# symfony/security-csrf пришёл в проект как зависимость symfony/security-bundle (нужен Блоку 5
# для входа), а не потому, что его специально ставили — его recipe сама создаёт этот файл и
# включает CSRF-защиту форм по умолчанию. Явно выключаем: без этого файла все формы Блока 4
# (написанные и проверенные ещё до появления Security) начинают требовать CSRF-токен в теле
# запроса и ломаются. Сама концепция CSRF по-прежнему разбирается в теории урока текстом.
framework:
    form:
        csrf_protection: false
